<!DOCTYPE html>
<html>
<head>
    <title>Sentiment Analysis App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            line-height: 1.6;
            background-color: #121212;
            color: #e0e0e0;
        }

        .container {
            border: 1px solid #333;
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #ffffff;
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            margin-bottom: 10px;
            background-color: #2c2c2c;
            color: #ffffff;
            border: 1px solid #444;
            border-radius: 4px;
            box-sizing: border-box;
        }

        select {
            background-color: #2c2c2c;
            color: #ffffff;
        }

        button {
            background-color: #0d6efd;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }

        button:hover {
            background-color: #0b5ed7;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
        }

        .positive {
            background-color: #1e3a1e;
            color: #d4edda;
            border: 1px solid #2d5a2d;
        }

        .negative {
            background-color: #3a1e1e;
            color: #f8d7da;
            border: 1px solid #5a2d2d;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Sentiment Analysis</h1>
    <form id="sentimentForm" method="post">
        {% csrf_token %}
        <div style="margin-bottom: 10px;">
            <label for="modelSelect">Select Model:</label>
            <select id="modelSelect" name="model_type"
                    style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #444;">
                <option value="dt">Decision Tree</option>
                <option value="rf" selected>Random Forest (Higher Accuracy)</option>
            </select>
        </div>
        <label for="commentInput"></label><textarea id="commentInput" name="comment" placeholder="Enter your text here..." required></textarea>
        <button type="submit">Analyze Sentiment</button>
    </form>

    <div id="resultContainer" class="result" style="display: none;">
        Sentiment: <span id="sentimentValue"></span><br>
        <small style="font-weight: normal; color: #aaa;">Model used: <span id="modelUsed"></span></small>
    </div>
</div>

<script>
    document.getElementById('sentimentForm').addEventListener('submit', function (e) {
        e.preventDefault();
        const resultContainer = document.getElementById('resultContainer');
        const sentimentValue = document.getElementById('sentimentValue');
        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

        fetch('{% url "api_sentiment" %}', {
            method: 'POST',
            headers: {
                'X-CSRFToken': csrfToken
            },
            body: new FormData(this)
        })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    resultContainer.style.display = 'block';
                    sentimentValue.textContent = data.sentiment.charAt(0).toUpperCase() + data.sentiment.slice(1);
                    document.getElementById('modelUsed').textContent = data.model_used;

                    // Reset classes and apply new one
                    resultContainer.className = 'result ' + data.sentiment.toLowerCase();
                } else {
                    alert('Error: ' + data.error);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('An error occurred. Please check console for details.');
            });
    });
</script>
</body>
</html>
