<!DOCTYPE html>
<html>
<head>
    <title>Sentiment Analysis App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #eef3f8;
            --card: #ffffff;
            --card-border: #dbe5ef;
            --text: #243447;
            --muted: #5f7184;
            --accent: #4f86c6;
            --accent-hover: #3e74b4;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
            line-height: 1.6;
            color: var(--text);
            display: grid;
            place-items: center;
            background: linear-gradient(180deg, #f4f7fb 0%, var(--bg) 100%);
        }

        .container {
            width: min(700px, 100%);
            border: 1px solid var(--card-border);
            background: var(--card);
            padding: 28px;
            border-radius: 14px;
            box-shadow: 0 10px 24px rgba(34, 52, 72, 0.08);
        }

        h1 {
            color: var(--text);
            text-align: center;
            margin: 0 0 6px;
            font-size: clamp(1.7rem, 3vw, 2.2rem);
            letter-spacing: 0.1px;
        }

        .subtitle {
            margin: 0 0 22px;
            text-align: center;
            color: var(--muted);
            font-size: 0.98rem;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #3d4f63;
        }

        textarea,
        select {
            width: 100%;
            padding: 11px 12px;
            background: #fbfdff;
            color: var(--text);
            border: 1px solid #cfd9e4;
            border-radius: 8px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
        }

        textarea {
            min-height: 130px;
            margin-bottom: 14px;
            resize: vertical;
        }

        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79, 134, 198, 0.16);
        }

        button {
            background: var(--accent);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.2px;
            transition: background-color 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            background: var(--accent-hover);
            box-shadow: 0 6px 16px rgba(79, 134, 198, 0.2);
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
        }

        .positive {
            background: #edf8f1;
            color: #2f6b49;
            border: 1px solid #cde9d7;
        }

        .negative {
            background: #fbeff0;
            color: #8a3e44;
            border: 1px solid #f2d0d3;
        }

        @media (max-width: 640px) {
            body {
                padding: 14px;
            }

            .container {
                padding: 20px;
                border-radius: 12px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Sentiment Analysis</h1>
    <p class="subtitle">Pick a model, enter a sentence, and get instant sentiment feedback.</p>
    <form id="sentimentForm" method="post">
        {% csrf_token %}
        <div style="margin-bottom: 12px;">
            <label for="modelSelect">Select Model:</label>
            <select id="modelSelect" name="model_type">
                <option value="dt">Decision Tree</option>
                <option value="rf" selected>Random Forest (Higher Accuracy)</option>
            </select>
        </div>
        <label for="commentInput"></label><textarea id="commentInput" name="comment" placeholder="Enter your text here..." required></textarea>
        <button type="submit">Analyze Sentiment</button>
    </form>

    <div id="resultContainer" class="result" style="display: none;">
        Sentiment: <span id="sentimentValue"></span><br>
        <small style="font-weight: normal; color: #5f7184;">Model used: <span id="modelUsed"></span></small>
    </div>
</div>

<script>
    document.getElementById('sentimentForm').addEventListener('submit', function (e) {
        e.preventDefault();
        const resultContainer = document.getElementById('resultContainer');
        const sentimentValue = document.getElementById('sentimentValue');
        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

        fetch('{% url "api_sentiment" %}', {
            method: 'POST',
            headers: {
                'X-CSRFToken': csrfToken
            },
            body: new FormData(this)
        })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    resultContainer.style.display = 'block';
                    sentimentValue.textContent = data.sentiment.charAt(0).toUpperCase() + data.sentiment.slice(1);
                    document.getElementById('modelUsed').textContent = data.model_used;

                    // Reset classes and apply new one
                    resultContainer.className = 'result ' + data.sentiment.toLowerCase();
                } else {
                    alert('Error: ' + data.error);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('An error occurred. Please check console for details.');
            });
    });
</script>
</body>
</html>
